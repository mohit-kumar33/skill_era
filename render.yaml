services:
  # ─────────────────────────────────────────────────────────
  # Fastify Backend Service
  # ─────────────────────────────────────────────────────────
  - type: web
    name: apex-backend
    env: node
    plan: free
    region: frankfurt # Free tier supported region
    buildCommand: npm install --include=dev && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000 # Render's default internal port

      # ── Database ──────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: apex-postgres
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: apex-postgres
          property: connectionString
      - key: DB_PASSWORD
        sync: false # Set in Render dashboard

      # ── Redis (Required for rate limiting & session) ─────
      - key: REDIS_URL
        sync: false # Set to your Redis provider URL (e.g. Upstash, Redis Cloud)

      # ── JWT Secrets (min 32 chars each) ──────────────────
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

      # ── Encryption (AES-256-GCM, min 44 chars base64) ───
      - key: ENCRYPTION_KEY
        sync: false # Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"

      # ── Webhook Secret (min 16 chars) ────────────────────
      - key: PAYMENT_WEBHOOK_SECRET
        generateValue: true

      # ── CORS Origins (comma-separated) ───────────────────
      - key: CORS_ORIGINS
        sync: false # Set to: https://fromskillera.netlify.app
      - key: CORS_ADMIN_ORIGINS
        sync: false # Set to: https://your-admin-panel.netlify.app

      # ── Cashfree Payment Gateway ─────────────────────────
      - key: CASHFREE_APP_ID
        sync: false
      - key: CASHFREE_API_KEY
        sync: false

      # ── Cloudflare Turnstile ─────────────────────────────
      - key: TURNSTILE_SECRET_KEY
        sync: false # Get from Cloudflare dashboard

databases:
  # ─────────────────────────────────────────────────────────
  # Managed PostgreSQL Database
  # ─────────────────────────────────────────────────────────
  - name: apex-postgres
    plan: free
    region: frankfurt
    postgresMajorVersion: 16

services:
  # ─────────────────────────────────────────────────────────
  # Fastify Backend Service
  # ─────────────────────────────────────────────────────────
  - type: web
    name: apex-backend
    env: node
    plan: free
    region: frankfurt # Free tier supported region
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000 # Render's default internal port
      # Database Connection Strings
      - key: DATABASE_URL
        fromDatabase:
          name: apex-postgres
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: apex-postgres
          property: connectionString
      # JWT & Security Secrets (Must be overridden in Render Dashboard)
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      # Cashfree Credentials (Must be overridden in Render Dashboard)
      - key: CASHFREE_APP_ID
        sync: false
      - key: CASHFREE_SECRET_KEY
        sync: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      # HyperVerge Credentials
      - key: HYPERVERGE_APP_ID
        sync: false
      - key: HYPERVERGE_APP_KEY
        sync: false
      # Origin restrictions
      - key: CORS_ORIGIN
        sync: false # Set to exactly https://your-netlify-url.netlify.app in dashboard
      - key: TURNSTILE_SECRET_KEY
        sync: false

databases:
  # ─────────────────────────────────────────────────────────
  # Managed PostgreSQL Database
  # ─────────────────────────────────────────────────────────
  - name: apex-postgres
    plan: free
    region: frankfurt
    postgresMajorVersion: 16
